site_name: Tracy
nav:
  - Documentation:
      - Overview: index.md
      - Get Started: get-started.md
      - OpenTelemetry: opentelemetry.md
      - Tracing API:
          - Overview: tracing/index.md
          - Configuration: tracing/configuration.md
          - LLM Auto-tracing: tracing/autotracing.md
          - Function Tracing: tracing/annotations.md
          - Manual Tracing: tracing/manual.md
          - Advanced Topics: tracing/advanced.md
      - OpenTelemetry Configuration:
          - Overview: otel-config/index.md
          - SDK Configuration: otel-config/sdk-configuration.md
          - Exporters: otel-config/exporters.md
      - Compiler Plugin:
          - Overview: compiler-plugin/index.md
          - How Tracy Transforms Code: compiler-plugin/ir-transformation.md
      - Debugging Tips: debugging.md
      - Limitations: limitations.md
  - API Reference: api/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - macros
  - autorefs

theme:
  name: material
  custom_dir: overrides
  favicon: assets/img/favicon.ico
#  logo: img/favicon.ico
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
  color_mode: light
  nav_style: light
  user_color_mode_toggle: true
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
      primary: black
      accent: blue
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
      primary: black
      accent: blue

extra_css:
  - stylesheets/extra.css

repo_url: https://github.com/JetBrains/tracy
repo_name: GitHub
edit_uri: edit/develop/docs/docs/
copyright: Copyright © 2026 JetBrains s.r.o.

extra:
  version:
    provider: mike
    alias: true
  api_docs_url: api/
  youtrack:
    url: https://youtrack.jetbrains.com/projects/TRACY/issues
    name: Issues
    icon: assets/img/youtrack-yt.jpg
